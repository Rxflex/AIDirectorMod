name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build and test
        run: ./gradlew --no-daemon --stacktrace build :paper:shadowJar

      - name: Upload Fabric JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aidirector-fabric
          path: fabric/build/libs/*.jar
          if-no-files-found: error

      - name: Upload NeoForge JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aidirector-neoforge
          path: neoforge/build/libs/*.jar
          if-no-files-found: error

      - name: Upload Paper JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aidirector-paper
          path: paper/build/libs/*.jar
          if-no-files-found: error

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore
