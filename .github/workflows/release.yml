name: release

# Cutting a release:
#   git tag v0.4.0
#   git push origin v0.4.0
# This workflow then builds every loader x Minecraft-version jar and publishes
# them on a GitHub Release named after the tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build every loader and Minecraft version
        run: |
          for mc in 1.21.1 1.21.3 1.21.4; do
            ./gradlew --no-daemon --stacktrace :fabric:build :neoforge:build \
              -Pmc="$mc" -Pmod_version="$VERSION"
          done
          ./gradlew --no-daemon --stacktrace :paper:shadowJar -Pmod_version="$VERSION"

      - name: Collect release jars
        run: |
          mkdir -p release
          find fabric/build/libs neoforge/build/libs paper/build/libs \
            -type f -name '*.jar' \
            ! -name '*-dev.jar' ! -name '*-dev-shadow.jar' ! -name '*-sources.jar' \
            -exec cp {} release/ \;
          echo "Release artifacts:"
          ls -1 release

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/*.jar \
            --repo "$GITHUB_REPOSITORY" \
            --title "AI Director $GITHUB_REF_NAME" \
            --generate-notes
